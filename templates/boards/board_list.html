<!DOCTYPE html>
<html lang="es">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0d1117] text-white">
    <nav class="p-6 border-b border-[#30363d] flex justify-between items-center bg-[#161b22]">
        <h1 class="text-xl font-bold italic">Gestor<span class="text-blue-500">Pro</span></h1>
        <form action="{% url 'logout' %}" method="post">{% csrf_token %}<button class="text-gray-400 hover:text-white">Cerrar Sesión</button></form>
    </nav>
    <div class="max-w-6xl mx-auto p-10">
        <h2 class="text-3xl font-bold mb-8">Mis Tableros</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            {% for board in boards %}
            <a href="{% url 'board_detail' board.id %}" class="block p-6 bg-[#161b22] border border-[#30363d] rounded-xl hover:border-blue-500 transition-all group">
                <h3 class="text-xl font-semibold mb-2 group-hover:text-blue-400">{{ board.title }}</h3>
                <p class="text-sm text-gray-500">{{ board.columns.count }} columnas activas</p>
            </a>
            {% empty %}
            <p class="text-gray-500">No tienes tableros. Crea uno en el Admin.</p>
            {% endfor %}
        </div>
    </div>
</body>
</html>
