<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | GestorPro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#0d1117] flex items-center justify-center h-screen">

<div class="bg-[#161b22] p-8 rounded-xl border border-[#30363d] w-full max-w-md shadow-2xl">

    <h2 class="text-2xl font-bold text-white mb-6 text-center italic">
        Gestor<span class="text-blue-500">Pro</span>
    </h2>

    <form method="post" class="space-y-4">
        {% csrf_token %}

        {% if form.errors %}
        <div class="bg-red-500/20 border border-red-500 text-red-300 p-2 rounded text-sm">
            Usuario o contraseña incorrectos
        </div>
        {% endif %}

        <div>
            <label class="block text-sm text-gray-400 mb-1">Usuario</label>
            <input type="text" name="username" required
                   class="w-full bg-[#0d1117] border border-[#30363d] rounded-lg p-2.5 text-white">
        </div>

        <div>
            <label class="block text-sm text-gray-400 mb-1">Contraseña</label>
            <input type="password" name="password" required
                   class="w-full bg-[#0d1117] border border-[#30363d] rounded-lg p-2.5 text-white">
        </div>

        <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-lg">
            Entrar
        </button>
    </form>

</div>

</body>
</html>
