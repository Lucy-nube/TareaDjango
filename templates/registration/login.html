<!DOCTYPE html>
<html lang="es">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0d1117] flex items-center justify-center h-screen">
    <div class="bg-[#161b22] p-8 rounded-xl border border-[#30363d] w-full max-w-md shadow-2xl">
        <h2 class="text-2xl font-bold text-white mb-6 text-center italic">Gestor<span class="text-blue-500">Pro</span></h2>
        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">Usuario</label>
                <input type="text" name="username" class="w-full bg-[#0d1117] border border-[#30363d] rounded-lg p-2.5 text-white focus:border-blue-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">Contraseña</label>
                <input type="password" name="password" class="w-full bg-[#0d1117] border border-[#30363d] rounded-lg p-2.5 text-white focus:border-blue-500 outline-none">
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-lg transition">Entrar</button>
        </form>
    </div>
</body>
</html>
